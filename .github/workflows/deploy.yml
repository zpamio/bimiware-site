# Optional: deploy to GitHub Pages on every push to main.
# If you deploy via Cloudflare Pages instead, you can delete this file.
#
# Before enabling: in the repo, go to Settings > Pages and set
# "Source" to "GitHub Actions". If serving from a project subpath
# (e.g. user.github.io/bimiware-site), also set `base` in astro.config.mjs.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
